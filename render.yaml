services:
  - type: web
    name: blackjack-bankroll-tracker
    env: node
    plan: free
    buildCommand: npm install --prefix server
    startCommand: npm run start --prefix server
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
